<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Isse button screen ke beech mein aayega */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f9;
            font-family: Arial, sans-serif;
        }

        .share-btn {
            background-color: #25D366; 
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px; /* Rounded corners */
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .share-btn:active {
            transform: scale(0.95); /* Click karne par chota hoga */
        }
    </style>
</head>
<body>

    <button class="share-btn" onclick="shareApp()">
        Share App Link
    </button>

    <script>
    function shareApp() {
        if (navigator.share) {
            navigator.share({
                title: 'Download our App',
                text: 'Hello! Download this Education App from here:',
                url: 'https://play.google.com/store/apps/details?id=sps.apk'
            })
            .then(() => console.log('Successful share'))
            .catch((error) => console.log('Error sharing', error));
        } else {
            alert("Please use a mobile browser to share.");
        }
    }
    </script>

</body>
</html>
